# Read the Docs configuration file for Sphinx projects
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"
  jobs:
    pre_build:
      # Check for broken links
      - python -m sphinx -b linkcheck docs $READTHEDOCS_OUTPUT/linkcheck

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: uv
      command: sync
      groups:
        - dev
